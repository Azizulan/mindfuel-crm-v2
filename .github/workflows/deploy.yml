name: Build & Deploy to cPanel

on:
  push:
    branches: [main]   # triggers on every push to main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React frontend
        run: npm run build
        # produces dist/ folder

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USER }}
          password: ${{ secrets.CPANEL_FTP_PASS }}
          local-dir: ./
          server-dir: /crm/               # change to your folder on the server
          exclude: |
            **/.git*/**
            **/node_modules/**
            .env
            .env.local
            **/*.log
